run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - unconvert
    - unparam
    - whitespace

linters-settings:
  goimports:
    local-prefixes: github.com/ffreis/dynamoctl
  gosec:
    excludes:
      - G115  # integer overflow (false positives in SDK code)
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:
  exclude-rules:
    # Test helpers often ignore errors intentionally.
    - path: "_test\\.go"
      linters: [errcheck, gosec]
  max-issues-per-linter: 0
  max-same-issues: 0
